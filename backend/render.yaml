services:
  - type: web
    name: shopease-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/Ecom-0.0.1-SNAPSHOT.jar
    healthCheckPath: /ecom/products/all
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false   # set manually in Render dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
