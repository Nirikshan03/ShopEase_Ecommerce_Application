name: ShopEase CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Backend: Build + Test ───────────────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test (Spring Boot)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: ecomdb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven (skip tests for fast build check)
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ecomdb_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
          JWT_SECRET: test-secret-key-for-ci-pipeline-only-32chars
          ALLOWED_ORIGIN: http://localhost:3000
        run: mvn clean package -DskipTests -q

      - name: 🧪 Run Unit Tests
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ecomdb_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
          JWT_SECRET: test-secret-key-for-ci-pipeline-only-32chars
          ALLOWED_ORIGIN: http://localhost:3000
        run: mvn test

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: 🐳 Build Docker image (verify Dockerfile is valid)
        working-directory: ./backend
        run: docker build -t shopease-backend:ci .

  # ─── Frontend: Build + Lint ──────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build & Lint (React)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔍 Lint check
        working-directory: ./frontend
        run: npm run build --if-present
        env:
          REACT_APP_API_URL: http://localhost:8080
          CI: false

      - name: 🐳 Build Docker image (verify Dockerfile is valid)
        working-directory: ./frontend
        run: docker build -t shopease-frontend:ci .

  # ─── Security: Dependency Scan ───────────────────────────────────────────────
  security-scan:
    name: 🔒 Security — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🛡️ OWASP Dependency Check
        working-directory: ./backend
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
        continue-on-error: true

      - name: 📋 Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: backend/target/dependency-check-report.html

  # ─── Summary ─────────────────────────────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend CI: ${{ needs.backend-ci.result }}"
          echo "Frontend CI: ${{ needs.frontend-ci.result }}"
          if [[ "${{ needs.backend-ci.result }}" != "success" || "${{ needs.frontend-ci.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed!"
            exit 1
          fi
          echo "✅ All CI checks passed!"
